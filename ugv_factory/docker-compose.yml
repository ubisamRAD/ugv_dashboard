services:
  postgres:
    image: postgres:16.4-alpine
    container_name: factory_postgres
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: factory_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "1883:1883"
      - "5672:5672"
      - "15672:15672"
      - "15674:15674"
      - "61613:61613"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    command: >
      bash -c "rabbitmq-plugins enable rabbitmq_mqtt rabbitmq_stomp rabbitmq_web_stomp rabbitmq_management && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: factory_influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: factory
      DOCKER_INFLUXDB_INIT_PASSWORD: factory123
      DOCKER_INFLUXDB_INIT_ORG: ubisam
      DOCKER_INFLUXDB_INIT_BUCKET: ugv
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: factory-influx-token
    ports:
      - "8086:8086"
    volumes:
      - influxdata:/var/lib/influxdb2

  redis:
    image: redis:7-alpine
    container_name: factory_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  factory-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_api
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/factory
      SPRING_DATA_REDIS_HOST: redis
      INFLUXDB_URL: http://influxdb:8086
      INFLUX_TOKEN: factory-influx-token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  rabbitmqdata:
  influxdata:
  redisdata:
