server:
  port: 8082

spring:
  application:
    name: factory-api

  datasource:
    url: jdbc:postgresql://localhost:5432/factory
    username: factory
    password: factory123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

ugv:
  bridge:
    url: http://localhost:8081

influxdb:
  url: http://localhost:8086
  token: ${INFLUX_TOKEN:}
  org: ubisam
  bucket: ugv

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
